<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>PIE ACREPLAST NR-10 offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(249,115,22,.18), transparent 38%), #020617;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }
      main {
        width: min(520px, 100%);
        border: 1px solid rgba(34,211,238,.18);
        border-radius: 24px;
        background: rgba(15,23,42,.86);
        padding: 28px;
        box-shadow: 0 24px 70px rgba(0,0,0,.35);
      }
      img { width: 84px; height: 84px; border-radius: 22px; object-fit: cover; margin-bottom: 20px; }
      h1 { margin: 0 0 12px; font-size: 1.5rem; color: #fb923c; }
      p { margin: 0 0 16px; line-height: 1.6; color: #cbd5e1; }
      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 18px;
        background: #f97316;
        color: #111827;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="PIE ACREPLAST NR-10" />
      <h1>Aplicativo sem conexão</h1>
      <p>Você está offline. O PIE ACREPLAST NR-10 já mantém a tela principal em cache, mas documentos, uploads e dados novos do Firebase precisam de internet.</p>
      <p>Conecte o celular ou computador à internet e tente novamente.</p>
      <button onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
